<svg xmlns="http://www.w3.org/2000/svg" viewBox="-60 -60 120 120">

  <rect x="-60" y="-60" width="120" height="120" fill="#0f172a"/>

  <g stroke="#4e9793" stroke-width="10" fill="none">
    <line x1="0" y1="-40" x2="0" y2="40"/>

    <g transform="scale(-1,-1)">
      <line x1="0" y1="-40" x2="20" y2="-40"/>
    </g>

    <g transform="scale(1,-1)">
      <line x1="0" y1="-40" x2="20" y2="-40"/>
      <line x1="0" y1="-20" x2="20" y2="-20"/>
      <line x1="20" y1="-40" x2="20" y2="-20"/>
    </g>

    <g transform="scale(-1,1)">
      <line x1="0" y1="-40" x2="20" y2="-40"/>
      <line x1="0" y1="-20" x2="20" y2="-20"/>
      <line x1="20" y1="-40" x2="20" y2="-20"/>
    </g>

    <line x1="0" y1="-20" x2="20" y2="-20"/>
  </g>
</svg>